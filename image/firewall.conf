# claude-airlock default egress allowlist.
#
# One entry per line; '#' comments and blank lines ignored. A line may carry a
# GROUP prefix ("group:domain"): its domain is allowed only when that group is
# active for the session (host-set via AIRLOCK_EGRESS_GROUPS — see `airlock
# egress`). UNTAGGED lines are CORE and always allowed, since Claude Code can't
# function without them. GitHub is a special CIDR group ("github") handled in
# init-firewall.sh. Projects add extra one-off domains via `egress =` in
# .airlock/config (host-approved, applies in any mode), not by editing this file.

# --- core: Anthropic (Claude API, auth/token refresh) — always allowed ---
api.anthropic.com
claude.ai
console.anthropic.com
# sentry.io is optional error-reporting telemetry; omitted for minimal egress.
# Statsig (feature flags) is not required and is intentionally not allowed.

# --- npm group (dev mode): package installs ---
npm:registry.npmjs.org

# --- pypi group (dev mode): package installs ---
pypi:pypi.org
pypi:files.pythonhosted.org
