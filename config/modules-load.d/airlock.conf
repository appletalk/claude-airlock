# claude-airlock — kernel modules required for the in-box egress firewall.
#
# Install as /etc/modules-load.d/airlock.conf (root), then reboot.
#
# WHY THIS IS NEEDED (rootless podman only):
#   The box raises its own default-DROP firewall with iptables + ipset. The kernel
#   refuses to AUTOLOAD netfilter modules on behalf of a process in a non-initial
#   user namespace — which is exactly what a rootless container is. So any module
#   that is not already resident when the box starts makes iptables/ipset fail
#   inside it, and the firewall cannot come up.
#
#   Under Docker this never surfaced: the Docker daemon runs as real root in the
#   initial userns, so it autoloads these on demand. Removing that daemon is the
#   whole point of going rootless, so we must preload them ourselves.
#
# Modules already built into the kernel are a harmless no-op here.

# nftables core, plus the xt_* compatibility layer. The box's iptables is
# iptables-nft (xtables-nft-multi), so it programs nftables under the hood.
nf_tables
nft_compat

# ipset: the egress allowlist is a hash:net set, matched from a rule via xt_set.
ip_set
ip_set_hash_net
xt_set

# Connection tracking, for the ESTABLISHED,RELATED accept rule.
nf_conntrack
xt_conntrack

# REJECT target (--reject-with icmp-admin-prohibited).
nft_reject
nft_reject_ipv4
nf_reject_ipv4

# IPv6 REJECT target (--reject-with icmp6-adm-prohibited). NOT optional: the firewall
# programs ip6tables and ABORTS if the box has a global v6 address it cannot filter, so
# on an IPv6-enabled host a missing module here means the box refuses to start.
#
# This is the ONLY module v6 adds. Everything else it needs is already above and serves
# both families: nf_tables/nft_compat (the box's ip6tables is ip6tables-nft, so the
# legacy ip6_tables/ip6table_filter modules are never used), ip_set_hash_net (which backs
# `family inet6` sets too), xt_set, and nf_conntrack.
nft_reject_ipv6
nf_reject_ipv6
